<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="desktop">
        <div class="shortcut" ondblclick="createWindow('Bu Bilgisayar')">
            <img src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/explorer.png" alt="PC">
            <span>Bu Bilgisayar</span>
        </div>
    </div>

    <div id="start-menu" class="hidden">
        <div class="start-content">
            <input type="text" class="search-bar" placeholder="🔍 Uygulama, ayar ve belge arayın">
            <div class="pinned-section">
                <div class="pinned-header">
                    <span>Sabitlenenler</span>
                    <button class="all-apps">Tüm uygulamalar ></button>
                </div>
                <div class="apps-grid">
                    <div class="app-item"><img src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/edge.png"><span>Edge</span></div>
                    <div class="app-item"><img src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/settings.png"><span>Ayarlar</span></div>
                    <div class="app-item"><img src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/store.png"><span>Store</span></div>
                    <div class="app-item"><img src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/mail.png"><span>Posta</span></div>
                </div>
            </div>
        </div>
    </div>

    <nav id="taskbar">
        <div class="taskbar-container">
            <img class="tb-icon start-btn" src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/home.png" title="Başlat">
            <img class="tb-icon" src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/search.png" title="Arama">
            <img class="tb-icon" src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/explorer.png" title="Dosya Gezgini" onclick="createWindow('Bu Bilgisayar')">
            <img class="tb-icon" src="https://raw.githubusercontent.com/blueedgetechno/windows11/master/public/img/icon/win/edge.png" title="Edge">
        </div>
        
        <div class="system-tray">
            <div class="tray-icons">
                <span>ENG</span>
                <span>🔊</span>
                <span>📶</span>
            </div>
            <div class="clock" id="clock">00:00</div>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
